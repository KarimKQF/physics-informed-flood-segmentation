  secondary_reference: STEP_5P
throughput_notes:
  batch_size: 2
  gradient_accumulation_steps: 4
  effective_batch_size: 8
  basis: batch_size=2 uses ~11821 MB peak VRAM (confirmed in readiness smoke 2026-06-22);
    safe headroom on RTX 4000 Ada 20 GB
  vs_bs1: 3x faster per epoch vs batch_size=1 accum=8 configuration
stability_notes:
  mixed_precision_preference: 16-mixed was preferred if stable
  mixed_precision_observation: Initial 16-mixed attempt produced non-finite epoch
    losses; FP32 used for stable run
  fallback_bs: If OOM at batch_size=2, fallback to batch_size=1 gradient_accumulation_steps=8
    in a separate fallback run directory
run_tag: step5s_a_low_data_n50_seed42_dice
notes: Low-data pilot baseline with 50 train samples selected from the validated STEP
  5E filtered train manifest using seed 42. Validation, test, and Bolivia/OOD splits
  are unchanged. Dice loss only; no DEM and no physics loss.
low_data_protocol:
  enabled: true
  subset_size: 50
  seed: 42
  nested_with_n100: true
  train_subset_manifest: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_seed42/flood_train_low_data_n50_seed42.txt
  source_train_manifest: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_train_step5e_filtered.txt
  selection_summary: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_seed42/selection_summary_seed42.json
  sampling_algorithm: Python random.Random(42).shuffle(full_train_ids); N=100 uses
    first 100; N=50 uses first 50 of the same shuffled order; manifests are written
    sorted for diff stability.
  valid_test_bolivia_splits_unchanged: true
  paired_physics_config: configs/low_data/step6c_v3_low_data_n50_seed42_lambda05_warmup.yaml
evaluation_splits:
  valid_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_valid_step5e_filtered.txt
  test_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_test_step5e_filtered.txt
  bolivia_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_bolivia_step5e_filtered.txt
  policy: Use the same filtered valid/test/Bolivia manifests as the full-data STEP
    5S-A and STEP 6C/v3 results.
comparison_full_data_results:
  step5s_a_full_data_baseline:
    model: TerraMind-L + UPerNet + Dice
    valid_miou: 0.881233
    test_miou: 0.873051
    bolivia_miou: 0.843955
  step6c_v3_full_data_physics:
    model: same model/dataloader as STEP 5S-A; Dice + lambda_topo * TopographicInconsistencyLoss
    valid_miou: 0.878494
    test_miou: 0.872132
    bolivia_miou: 0.846406
    topographic_violation_reduction: about 7-10 percent
runtime_estimate: about 1.2-1.5 hours for 80 epochs on RTX 4000 Ada 20 GB

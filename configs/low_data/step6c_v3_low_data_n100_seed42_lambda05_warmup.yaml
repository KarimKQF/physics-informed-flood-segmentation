step: 6C-v3-low-data-n100-seed42-lambda05-warmup
status: prepared_not_launched
seed_everything: 42
run_dir: E:/flood_research/experiments/terramind_baseline/runs/step6c_v3_low_data_n100_seed42_lambda05_warmup
run_tag: step6c_v3_low_data_n100_seed42_lambda05_warmup
notes: Low-data pilot physics run with 100 train samples selected from the validated
  STEP 5E filtered train manifest using seed 42. Same model/dataloader policy as STEP
  5S-A; aligned DEM is loaded only as batch['topography'] for the loss and is never
  a model input.
guardrails:
  physics_loss_training_started: false
  dem_as_model_input: false
  dem_in_loss_only: true
  darn_started: false
  sturm_training_started: false
  raw_data_modified: false
  official_split_files_modified: false
  baseline_for_comparison: 5S-A-low-data-n100-seed42
  keep_dem_outside_batch_image: true
  segformer_started: false
  mamba_started: false
  preserve_existing_runs: true
physics_loss:
  enabled: true
  type: TopographicInconsistencyLoss
  combined_loss_class: CombinedDicePhysicsLoss
  lambda_topo: 0.5
  lambda_schedule:
    type: warmup_linear
    warmup_epochs: 5
    ramp_epochs: 15
    description: epochs 1-5 lambda=0; epochs 6-19 linear warmup; epoch 20+ lambda=0.5
  dice_smooth: 0.0
  segmentation_loss: dice
  total_loss_formula: smp_DiceLoss(logits, target) + lambda(epoch) * TopographicInconsistencyLoss(logits,
    target, dem)
  elevation_margin: 0.0
  elevation_scale: 1.0
  use_elevation_weight: true
  neighborhood: '4'
  ignore_index: -1
  water_class: 1
dem:
  use_as_model_input: false
  use_in_loss: true
  returned_in_batch_key: topography
  aligned_dem_root: E:/flood_research/data/derived/sen1floods11_topography/dem_aligned
  dem_filename_pattern: '{split}_{tile_id}_copernicus_glo30_dem_aligned.tif'
  dem_source: Copernicus GLO-30 DSM aligned to Sen1Floods11 LabelHand grid
  verified_samples: 441
  qc_status: topographic_alignment_validated
trainer:
  accelerator: gpu
  devices: 1
  precision: '32'
  batch_size: 2
  gradient_accumulation_steps: 4
  effective_batch_size: 8
  max_epochs: 80
  early_stopping_monitor: validation_miou
  early_stopping_mode: max
  early_stopping_patience: 15
  early_stopping_min_epochs: 30
  batchnorm_eval_policy: BatchNorm modules kept in eval mode and affine parameters
    frozen (UPerNet PSP requirement)
data:
  dataloader_side_d4: true
  no_training_loop_d4: true
  class_path: step6c_v3_train.TopographyDataModule
  init_args:
    task: segmentation
    batch_size: 2
    num_workers: 0
    modalities:
    - S2L1C
    - S1GRD
    rgb_modality: S2L1C
    rgb_indices:
    - 3
    - 2
    - 1
    train_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    train_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    val_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    val_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    test_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    test_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    train_split: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_seed42/flood_train_low_data_n100_seed42.txt
    val_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_valid_step5e_filtered.txt
    test_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_test_step5e_filtered.txt
    image_grep:
      S2L1C: '*_S2Hand.tif'
      S1GRD: '*_S1Hand.tif'
    label_grep: '*_LabelHand.tif'
    no_label_replace: -1
    no_data_replace: 0
    num_classes: 2
    means:
      S2L1C:
      - 2357.089
      - 2137.385
      - 2018.788
      - 2082.986
      - 2295.651
      - 2854.537
      - 3122.849
      - 3040.56
      - 3306.481
      - 1473.847
      - 506.07
      - 2472.825
      - 1838.929
      S1GRD:
      - -12.599
      - -20.293
    stds:
      S2L1C:
      - 1624.683
      - 1675.806
      - 1557.708
      - 1833.702
      - 1823.738
      - 1733.977
      - 1732.131
      - 1679.732
      - 1727.26
      - 1024.687
      - 442.165
      - 1331.411
      - 1160.419
      S1GRD:
      - 5.195
      - 5.89
    train_transform:
    - class_path: albumentations.D4
    - class_path: albumentations.pytorch.transforms.ToTensorV2
    val_transform: null
    test_transform: null
    pin_memory: true
model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: terramind_v1_large
      backbone_pretrained: false
      backbone_modalities:
      - S2L1C
      - S1GRD
      backbone_merge_method: mean
      necks:
      - name: SelectIndices
        indices:
        - 5
        - 11
        - 17
        - 23
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
      decoder: UperNetDecoder
      decoder_channels: 256
      head_dropout: 0.1
      num_classes: 2
      backbone_ckpt_path: E:/flood_research/experiments/terramind_baseline/checkpoints/pretrained/TerraMind_v1_large.pt
      decoder_pool_scales:
      - 1
      - 2
      - 3
      - 6
      decoder_align_corners: true
      decoder_scale_modules: false
    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    class_names:
    - Others
    - Flood
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 2.0e-05
    weight_decay: 0.0001
lr_scheduler:
  class_path: torch.optim.lr_scheduler.ReduceLROnPlateau
  init_args:
    mode: max
    factor: 0.5
    patience: 3
  monitor: validation_miou
dataset_policy:
  dataset: Sen1Floods11
  train: 100
  valid: 86
  test: 89
  bolivia: 15
  excluded_fully_invalid_tile_ids:
  - Ghana_234935
  - Ghana_26376
  - Ghana_277
  - Ghana_5079
  - Ghana_83483
  keep_no_water: true
  keep_warning_review: true
  ignore_index: -1
  water_class_index: 1
  full_train_reference: 251
comparison_baseline:
  step: 5S-A
  valid_miou: 0.8812325126729853
  test_miou: 0.8730507303031354
  bolivia_miou: 0.8439550005662613
  checkpoint: E:/flood_research/experiments/terramind_baseline/runs/step5s_a_terramind_l_upernet_corrected_indices_dice_bs2_accum4/checkpoints/best_checkpoint.pt
low_data_protocol:
  enabled: true
  subset_size: 100
  seed: 42
  nested_with_n100: true
  train_subset_manifest: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_seed42/flood_train_low_data_n100_seed42.txt
  source_train_manifest: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_train_step5e_filtered.txt
  selection_summary: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_seed42/selection_summary_seed42.json
  sampling_algorithm: Python random.Random(42).shuffle(full_train_ids); N=100 uses
    first 100; N=50 uses first 50 of the same shuffled order; manifests are written
    sorted for diff stability.
  valid_test_bolivia_splits_unchanged: true
  paired_baseline_config: configs/low_data/step5s_a_low_data_n100_seed42.yaml
evaluation_splits:
  valid_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_valid_step5e_filtered.txt
  test_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_test_step5e_filtered.txt
  bolivia_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_bolivia_step5e_filtered.txt
  policy: Use the same filtered valid/test/Bolivia manifests as the full-data STEP
    5S-A and STEP 6C/v3 results.
comparison_full_data_results:
  step5s_a_full_data_baseline:
    model: TerraMind-L + UPerNet + Dice
    valid_miou: 0.881233
    test_miou: 0.873051
    bolivia_miou: 0.843955
  step6c_v3_full_data_physics:
    model: same model/dataloader as STEP 5S-A; Dice + lambda_topo * TopographicInconsistencyLoss
    valid_miou: 0.878494

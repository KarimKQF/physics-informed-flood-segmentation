step: E1-E2-N50-multiseed-physics-shuffled_dem
status: prepared_not_launched
seed_everything: 3
run_dir: E:/flood_research/experiments/terramind_baseline/runs/n50_seed3_physics_shuffled_dem_lambda05
run_tag: n50_seed3_physics_shuffled_dem_lambda05
notes: >-
  E1+E2 experiment: Physics at N=50, seed 3, condition=shuffled_dem.
  Shuffled DEM control (E2). Each training sample receives the DEM of a different sample. DEM assignment permuted with random.Random(10003). Topographic structure preserved within each DEM chip, but sample-topography correspondence broken. Topo metrics at eval time use real DEM to measure physical coherence.
  Part of multi-seed E1+E2 block to assess collapse robustness and
  whether physics effect requires real topographic correspondence.
guardrails:
  physics_loss_training_started: false
  dem_as_model_input: false
  dem_in_loss_only: true
  lambda_topo_is_zero: false
  dem_shuffled_control: true
  darn_started: false
  sturm_training_started: false
  raw_data_modified: false
  official_split_files_modified: false
  baseline_for_comparison: dice_only_seed3
  keep_dem_outside_batch_image: true
  segformer_started: false
  mamba_started: false
  preserve_existing_runs: true
physics_loss:
  enabled: true
  type: TopographicInconsistencyLoss
  combined_loss_class: CombinedDicePhysicsLoss
  lambda_topo: 0.5
  lambda_schedule:
    type: warmup_linear
    warmup_epochs: 5
    ramp_epochs: 15
    description: epochs 1-5 lambda=0; epochs 6-19 linear warmup 0->0.5; epoch 20+ lambda=0.5
  dice_smooth: 0.0
  segmentation_loss: dice
  total_loss_formula: "smp_DiceLoss(logits, target) + lambda(epoch) * TopographicInconsistencyLoss"
  elevation_margin: 0.0
  elevation_scale: 1.0
  use_elevation_weight: true
  neighborhood: "4"
  ignore_index: -1
  water_class: 1
dem:
  use_as_model_input: false
  use_in_loss: true
  returned_in_batch_key: topography
  aligned_dem_root: E:/flood_research/data/derived/sen1floods11_topography/dem_aligned
  dem_filename_pattern: "{split}_{tile_id}_copernicus_glo30_dem_aligned.tif"
  dem_source: Copernicus GLO-30 DSM aligned to Sen1Floods11 LabelHand grid
  dem_tile_id_map_file: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_multiseed/dem_shuffle_map_n50_seed3.json
trainer:
  accelerator: gpu
  devices: 1
  precision: '32'
  batch_size: 2
  gradient_accumulation_steps: 4
  effective_batch_size: 8
  max_epochs: 80
  early_stopping_monitor: validation_miou
  early_stopping_mode: max
  early_stopping_patience: 15
  early_stopping_min_epochs: 30
  batchnorm_eval_policy: BatchNorm modules kept in eval mode (UPerNet PSP requirement)
data:
  dataloader_side_d4: true
  no_training_loop_d4: true
  class_path: step6c_v3_train.TopographyDataModule
  init_args:
    task: segmentation
    batch_size: 2
    num_workers: 0
    modalities:
    - S2L1C
    - S1GRD
    rgb_modality: S2L1C
    rgb_indices:
    - 3
    - 2
    - 1
    train_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    train_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    val_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    val_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    test_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    test_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    train_split: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/low_data_multiseed/flood_train_low_data_n50_seed3.txt
    val_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_valid_step5e_filtered.txt
    test_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_test_step5e_filtered.txt
    image_grep:
      S2L1C: '*_S2Hand.tif'
      S1GRD: '*_S1Hand.tif'
    label_grep: '*_LabelHand.tif'
    no_label_replace: -1
    no_data_replace: 0
    num_classes: 2
    means:
      S2L1C:
      - 2357.089
      - 2137.385
      - 2018.788
      - 2082.986
      - 2295.651
      - 2854.537
      - 3122.849
      - 3040.56
      - 3306.481
      - 1473.847
      - 506.07
      - 2472.825
      - 1838.929
      S1GRD:
      - -12.599
      - -20.293
    stds:
      S2L1C:
      - 1624.683
      - 1675.806
      - 1557.708
      - 1833.702
      - 1823.738
      - 1733.977
      - 1732.131
      - 1679.732
      - 1727.26
      - 1024.687
      - 442.165
      - 1331.411
      - 1160.419
      S1GRD:
      - 5.195
      - 5.89
    train_transform:
    - class_path: albumentations.D4
    - class_path: albumentations.pytorch.transforms.ToTensorV2
    val_transform: null
    test_transform: null
    pin_memory: true
model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: terramind_v1_large
      backbone_pretrained: false
      backbone_modalities:
      - S2L1C
      - S1GRD
      backbone_merge_method: mean
      necks:
      - name: SelectIndices
        indices:
        - 5
        - 11
        - 17
        - 23
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
      decoder: UperNetDecoder
      decoder_channels: 256
      head_dropout: 0.1
      num_classes: 2
      backbone_ckpt_path: E:/flood_research/experiments/terramind_baseline/checkpoints/pretrained/TerraMind_v1_large.pt
      decoder_pool_scales:
      - 1
      - 2
      - 3
      - 6
      decoder_align_corners: true
      decoder_scale_modules: false
    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    class_names:
    - Others
    - Flood
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 2.0e-05
    weight_decay: 0.0001
lr_scheduler:
  class_path: torch.optim.lr_scheduler.ReduceLROnPlateau
  init_args:
    mode: max
    factor: 0.5
    patience: 3
  monitor: validation_miou
dataset_policy:
  dataset: Sen1Floods11
  train: 50
  valid: 86
  test: 89
  bolivia: 15
  excluded_fully_invalid_tile_ids:
  - Ghana_234935
  - Ghana_26376
  - Ghana_277
  - Ghana_5079
  - Ghana_83483
  keep_no_water: true
  keep_warning_review: true
  ignore_index: -1
  water_class_index: 1
  full_train_reference: 251
evaluation_splits:
  valid_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_valid_step5e_filtered.txt
  test_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_test_step5e_filtered.txt
  bolivia_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_bolivia_step5e_filtered.txt
  policy: Same filtered valid/test/Bolivia as all other runs. Bolivia never used for selection.
experiment:
  block: E1_E2_multiseed_n50
  condition: physics_shuffled_dem
  seed: 3
  paired_dice_only: configs/multiseed_n50/n50_seed3_dice_only.yaml

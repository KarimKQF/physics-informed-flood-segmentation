# SegMAN-S + Dice loss only | Full Sen1Floods11 (N=251 train) | seed 0
# Dice-only: implemented as dice_ce mode with ce_alpha=0.0 (no code change needed).
# Architecture fixed: SegMAN-S (33.45M params, 15-channel input).
# DEM is never a model input in this study.
step: SEGMAN-full-seed0-dice
seed: 0
seed_everything: 0
run_dir: E:/flood_research/experiments/segman/runs/full_seed0_dice
run_tag: full_seed0_dice
notes: >-
  SegMAN-S on full Sen1Floods11 (251 train tiles) seed0 with Dice loss only
  (ce_alpha=0.0 gives L = Dice + 0*CE = Dice). DEM not used at all. Full-dataset
  baseline, second of three standard-loss comparisons (CE / Dice / Dice+CE).
guardrails:
  dem_as_model_input: false
  dem_in_loss_only: false
  raw_data_modified: false
  official_split_files_modified: false
  preserve_existing_runs: true

model:
  name: SegMAN
  variant: s
  in_chans: 15          # 13 S2L1C + 2 S1GRD — DEM is NEVER a model input
  num_classes: 2        # 0=non-water/background, 1=water/flood
  image_size: 512
  dropout_ratio: 0.1
  drop_path_rate: 0.1
  use_checkpoint: true
  pretrained_encoder: null

loss:
  mode: dice_ce         # ce_alpha=0.0 → L = Dice + 0*CE = Dice only
  ce_alpha: 0.0
  lambda_topo: 0.0
  dice_smooth: 0.0
  ignore_index: -1
  water_class: 1

dem:
  use_as_model_input: false
  use_in_loss: false
  returned_in_batch_key: topography
  aligned_dem_root: E:/flood_research/data/derived/sen1floods11_topography/dem_aligned
  dem_filename_pattern: "{split}_{tile_id}_copernicus_glo30_dem_aligned.tif"
  dem_source: Copernicus GLO-30 DSM aligned to Sen1Floods11 LabelHand grid
  dem_tile_id_map: null

trainer:
  accelerator: gpu
  devices: 1
  precision: '32'
  batch_size: 2
  gradient_accumulation_steps: 4
  effective_batch_size: 8
  max_epochs: 100
  early_stopping_monitor: validation_miou
  early_stopping_mode: max
  early_stopping_patience: 20
  early_stopping_min_epochs: 30

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 6.0e-5
    weight_decay: 0.01

lr_scheduler:
  class_path: torch.optim.lr_scheduler.ReduceLROnPlateau
  init_args:
    mode: max
    factor: 0.5
    patience: 5
  monitor: validation_miou

data:
  dataloader_side_d4: true
  class_path: step6c_v3_train.TopographyDataModule
  init_args:
    task: segmentation
    batch_size: 2
    num_workers: 0
    modalities:
    - S2L1C
    - S1GRD
    rgb_modality: S2L1C
    rgb_indices:
    - 3
    - 2
    - 1
    train_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    train_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    val_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    val_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    test_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    test_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    train_split: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/flood_train_data.txt
    val_split: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/flood_valid_data.txt
    test_split: C:/flood_research/repos/physics-informed-flood-segmentation/manifests/terramind_baseline/flood_test_data.txt
    image_grep:
      S2L1C: '*_S2Hand.tif'
      S1GRD: '*_S1Hand.tif'
    label_grep: '*_LabelHand.tif'
    no_label_replace: -1
    no_data_replace: 0
    num_classes: 2
    means:
      S2L1C:
      - 2357.089
      - 2137.385
      - 2018.788
      - 2082.986
      - 2295.651
      - 2854.537
      - 3122.849
      - 3040.56
      - 3306.481
      - 1473.847
      - 506.07
      - 2472.825
      - 1838.929
      S1GRD:
      - -12.599
      - -20.293
    stds:
      S2L1C:
      - 1624.683
      - 1675.806
      - 1557.708
      - 1833.702
      - 1823.738
      - 1733.977
      - 1732.131
      - 1679.732
      - 1727.26
      - 1024.687
      - 442.165
      - 1331.411
      - 1160.419
      S1GRD:
      - 5.195
      - 5.89
    train_transform:
    - class_path: albumentations.D4
    - class_path: albumentations.pytorch.transforms.ToTensorV2
    val_transform: null
    test_transform: null
    pin_memory: true

dataset_policy:
  dataset: Sen1Floods11_full
  train: 251
  valid: 86
  test: 89
  bolivia: 15
  ignore_index: -1
  water_class_index: 1

experiment:
  block: SEGMAN_cvpr2025_full_baselines
  condition: dice
  seed: 0

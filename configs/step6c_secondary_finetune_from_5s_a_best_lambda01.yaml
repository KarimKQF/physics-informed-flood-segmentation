step: 6C-secondary-finetune
status: prepared_not_launched
seed_everything: 42
run_dir: E:/flood_research/experiments/terramind_baseline/runs/step6c_secondary_finetune_from_5s_a_best_lambda01
run_tag: step6c_secondary_finetune_lambda01
secondary_experiment: true
notes: >-
  SECONDARY experiment, NOT the primary fair-comparison baseline. This warm-starts
  from the STEP 5S-A best checkpoint (an already-trained, non-degenerate model with
  val_iou_water ~ 0.79) and fine-tunes with a LOW learning rate plus the topographic
  prior (lambda_topo=0.1 constant). Because the model starts far from the all-dry
  absorbing state, the topographic loss can be applied from epoch 1 safely. Use this
  to measure physical-consistency / OOD effects of the topographic prior on a strong
  model; do NOT report it as the from-scratch fair comparison against STEP 5S-A.
guardrails:
  physics_loss_training_started: false
  dem_as_model_input: false
  dem_in_loss_only: true
  darn_started: false
  sturm_training_started: false
  raw_data_modified: false
  official_split_files_modified: false
  baseline_for_comparison: STEP_5S_A
initialization:
  from_checkpoint: E:/flood_research/experiments/terramind_baseline/runs/step5s_a_terramind_l_upernet_corrected_indices_dice_bs2_accum4/checkpoints/best_checkpoint.pt
  load_weights_only: true
  rationale: warm-start from a healthy non-degenerate model so the topographic prior refines rather than collapses
physics_loss:
  enabled: true
  type: TopographicInconsistencyLoss
  combined_loss_class: CombinedDicePhysicsLoss
  lambda_topo: 0.1
  lambda_schedule:
    type: constant
  dice_smooth: 0.0
  segmentation_loss: dice
  total_loss_formula: "smp_DiceLoss(logits, target) + 0.1 * TopographicInconsistencyLoss(logits, target, dem)"
  elevation_margin: 0.0
  elevation_scale: 1.0
  use_elevation_weight: true
  neighborhood: "4"
  ignore_index: -1
  water_class: 1
dem:
  use_as_model_input: false
  use_in_loss: true
  aligned_dem_root: E:/flood_research/data/derived/sen1floods11_topography/dem_aligned
  dem_filename_pattern: "{split}_{tile_id}_copernicus_glo30_dem_aligned.tif"
  dem_source: Copernicus GLO-30 DSM aligned to Sen1Floods11 LabelHand grid
  verified_samples: 441
  qc_status: topographic_alignment_validated
trainer:
  accelerator: gpu
  devices: 1
  precision: '32'
  batch_size: 2
  gradient_accumulation_steps: 4
  effective_batch_size: 8
  max_epochs: 40
  early_stopping_monitor: validation_miou
  early_stopping_mode: max
  early_stopping_patience: 10
  early_stopping_min_epochs: 10
  batchnorm_eval_policy: BatchNorm modules kept in eval mode and affine parameters frozen (UPerNet PSP requirement)
data:
  class_path: terratorch.datamodules.GenericMultiModalDataModule
  init_args:
    task: segmentation
    batch_size: 2
    num_workers: 0
    modalities:
    - S2L1C
    - S1GRD
    rgb_modality: S2L1C
    rgb_indices:
    - 3
    - 2
    - 1
    train_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    train_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    val_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    val_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    test_data_root:
      S2L1C: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S2Hand
      S1GRD: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/S1Hand
    test_label_data_root: E:/flood_research/data/raw/sen1floods11/v1.1/data/flood_events/HandLabeled/LabelHand
    train_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_train_step5e_filtered.txt
    val_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_valid_step5e_filtered.txt
    test_split: E:/flood_research/experiments/terramind_baseline/runs/step5e_tiny_unetdecoder_baseline/manifests/flood_test_step5e_filtered.txt
    image_grep:
      S2L1C: '*_S2Hand.tif'
      S1GRD: '*_S1Hand.tif'
    label_grep: '*_LabelHand.tif'
    no_label_replace: -1
    no_data_replace: 0
    num_classes: 2
    means:
